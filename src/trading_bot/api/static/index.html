<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trading Bot Dashboard</title>
<style>
  body { font-family: system-ui, Arial, sans-serif; margin: 0; background: #0f1115; color: #e6e6e6; }
  .wrap { max-width: 960px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 20px; }
  h2 { font-size: 16px; margin-top: 28px; }
  .cards { display: flex; gap: 16px; flex-wrap: wrap; }
  .card { background: #1a1d24; border: 1px solid #2a2f3a; border-radius: 8px; padding: 16px; flex: 1; min-width: 140px; }
  .card h3 { margin: 0 0 4px; font-size: 12px; color: #8a93a3; text-transform: uppercase; }
  .card .v { font-size: 22px; }
  table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  th, td { text-align: left; padding: 8px; border-bottom: 1px solid #2a2f3a; font-size: 14px; }
  .killbtn { background: #b3261e; color: #fff; border: 0; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 15px; }
  .resumebtn { background: #1e7d34; color: #fff; border: 0; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 15px; }
  .banner { background: #4a1410; border: 1px solid #b3261e; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; }
  .muted { color: #8a93a3; }
  #err { background: #4a1410; border: 1px solid #b3261e; padding: 8px 12px; border-radius: 6px; margin: 12px 0; display: none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Trading Bot Dashboard</h1>
  <div id="err"></div>
  <div id="banner"></div>
  <div id="controls" style="margin:12px 0;"></div>
  <div class="cards">
    <div class="card"><h3>Equity</h3><div class="v" id="equity">--</div></div>
    <div class="card"><h3>Cash</h3><div class="v" id="cash">--</div></div>
    <div class="card"><h3>Exposure</h3><div class="v" id="exposure">--</div></div>
    <div class="card"><h3>Realized P&amp;L</h3><div class="v" id="pnl">--</div></div>
  </div>
  <h2>Positions</h2>
  <table><thead><tr><th>Symbol</th><th>Qty</th><th>Avg cost</th><th>Price</th><th>Unrealized</th></tr></thead>
    <tbody id="positions"><tr><td colspan="5" class="muted">Loading...</td></tr></tbody></table>
  <h2>Recent decisions</h2>
  <table><thead><tr><th>Time</th><th>Symbol</th><th>Action</th><th>Why</th></tr></thead>
    <tbody id="decisions"><tr><td colspan="4" class="muted">Loading...</td></tr></tbody></table>
  <h2>Alerts &amp; events</h2>
  <table><thead><tr><th>Time</th><th>Kind</th><th>Detail</th></tr></thead>
    <tbody id="events"><tr><td colspan="3" class="muted">Loading...</td></tr></tbody></table>
  <p class="muted" id="updated"></p>
</div>
<script>
function money(n){ return "$" + Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function esc(s){ var d=document.createElement("div"); d.textContent = s==null?"":String(s); return d.innerHTML; }
function showErr(msg){ var e=document.getElementById("err"); e.style.display="block"; e.textContent = msg; }

async function getJSON(u){ var r = await fetch(u); if(!r.ok) throw new Error(u+" -> "+r.status); return r.json(); }

async function kill(){ await fetch("/api/kill",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({reason:"manual from dashboard"})}); load(); }
async function resume(){ await fetch("/api/resume",{method:"POST"}); load(); }

function rows(tbodyId, items, render, emptyCols, emptyMsg){
  var tb = document.getElementById(tbodyId);
  if(!items || items.length===0){ tb.innerHTML = '<tr><td colspan="'+emptyCols+'" class="muted">'+emptyMsg+'</td></tr>'; return; }
  tb.innerHTML = items.map(render).join("");
}

async function load(){
  try{
    var status = await getJSON("/api/status");
    var pf = await getJSON("/api/portfolio");
    var decisions = await getJSON("/api/decisions");
    var events = await getJSON("/api/events");
    document.getElementById("err").style.display="none";

    document.getElementById("banner").innerHTML = status.killed
      ? '<div class="banner">KILL SWITCH ACTIVE — '+esc(status.kill_reason||"trading halted")+'</div>' : "";
    document.getElementById("controls").innerHTML = status.killed
      ? '<button class="resumebtn" id="rb">Resume trading</button>'
      : '<button class="killbtn" id="kb">Kill switch — halt trading</button>';
    var kb=document.getElementById("kb"); if(kb) kb.onclick=kill;
    var rb=document.getElementById("rb"); if(rb) rb.onclick=resume;

    document.getElementById("equity").textContent = money(pf.equity);
    document.getElementById("cash").textContent = money(pf.cash);
    document.getElementById("exposure").textContent = ((pf.exposure||0)*100).toFixed(1)+"%";
    document.getElementById("pnl").textContent = money(pf.realized_pnl);

    rows("positions", pf.positions, function(p){
      return "<tr><td>"+esc(p.symbol)+"</td><td>"+Number(p.qty).toFixed(4)+"</td><td>"+money(p.avg_cost)+"</td><td>"+money(p.price)+"</td><td>"+money(p.unrealized_pnl)+"</td></tr>";
    }, 5, "No open positions");
    rows("decisions", decisions, function(d){
      return '<tr><td class="muted">'+esc(d.ts)+"</td><td>"+esc(d.symbol)+"</td><td>"+esc(d.action)+"</td><td>"+esc(d.rationale)+"</td></tr>";
    }, 4, "No decisions yet");
    rows("events", events, function(e){
      return '<tr><td class="muted">'+esc(e.ts)+"</td><td>"+esc(e.kind)+"</td><td>"+esc(e.detail)+"</td></tr>";
    }, 3, "No events");

    document.getElementById("updated").textContent = "Updated " + new Date().toLocaleTimeString();
  }catch(e){
    showErr("Could not load data: " + e.message);
  }
}
load();
setInterval(load, 15000);
</script>
</body>
</html>
