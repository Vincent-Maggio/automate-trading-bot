universe:
  - SPY
  - QQQ
  - VTI
  - IWM
  - DIA
  - AAPL
  - MSFT
  - GOOGL
  - AMZN
  - JPM
  - JNJ
  - PG
  - KO
  - V

capital:
  starting_cash: 500.0

data:
  timeframe: "1Day"
  cache_db: "market_data.sqlite"

backtest:
  start: "2023-01-01"
  end: "2024-01-01"

decision:
  threshold: 0.5
  min_consensus: 2
  weights:
    sma_crossover: 1.0
    rsi: 1.0
    momentum: 1.0

risk:
  max_position_pct: 0.20
  max_total_exposure_pct: 0.80
  max_positions: 5
  min_order_notional: 1.0
  stop_loss_pct: 0.05
  take_profit_pct: 0.10
  per_trade_pct: 0.10
  max_daily_loss_pct: 0.03

execution:
  mode: "sim"
  audit_db: "audit.sqlite"
  live: false

control:
  db: "control.sqlite"

runtime:
  poll_interval_seconds: 300

reporting:
  delivery: "console"
  morning_hour: 8
  nightly_hour: 18
  recent_limit: 20

strategies:
  sma_crossover:
    fast: 20
    slow: 50
  rsi:
    period: 14
    oversold: 30.0
    overbought: 70.0
  momentum:
    lookback: 20
